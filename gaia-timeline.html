<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galatsi — Construction Timeline Editor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f13;color:#e8e8e8}
header{background:#16161d;border-bottom:1px solid #2a2a3a;padding:20px 32px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
header h1{font-size:20px;font-weight:600;color:#fff}
.sub{font-size:13px;color:#888;margin-top:4px}
.header-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
select{background:#1e1e2e;border:1px solid #3a3a5a;color:#e8e8e8;padding:8px 16px;border-radius:8px;font-size:14px;cursor:pointer;min-width:200px}
select:focus{outline:1px solid #5ba3f5}
.btn{padding:8px 20px;border-radius:8px;border:1px solid;cursor:pointer;font-size:13px;font-weight:600;transition:all 0.2s}
.btn-primary{background:#1e3a5f;color:#5ba3f5;border-color:#2a5080}
.btn-primary:hover{background:#2a5080}
.btn-save{background:#1a4a2e;color:#4dba78;border-color:#2d8a52}
.btn-save:hover{background:#22663d}
.btn-danger{background:#3a1020;color:#f05070;border-color:#8a2040}
.btn-danger:hover{background:#5a1830}
.lang-btn{background:#1e1e2e;border:1px solid #3a3a5a;color:#aaa;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:all 0.2s}.lang-btn:hover{background:#2a2a4a;color:#fff}
.container{padding:24px 32px;max-width:1600px;margin:0 auto}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.stat{background:#16161d;border:1px solid #2a2a3a;border-radius:10px;padding:14px 18px}
.stat .slabel{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:1px}
.stat .svalue{font-size:22px;font-weight:700;color:#fff;margin-top:4px}
.stat .ssub{font-size:12px;color:#888;margin-top:2px}
.legend{display:flex;gap:20px;margin-bottom:20px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:8px;font-size:12px;color:#aaa}
.legend-dot{width:12px;height:12px;border-radius:3px}
.gantt-wrap{background:#16161d;border:1px solid #2a2a3a;border-radius:12px;overflow-x:auto;overflow-y:visible;cursor:grab}
.gantt-inner{min-width:2200px}
.gantt-header-row{display:flex;background:#1a1a24;border-bottom:1px solid #2a2a3a;position:sticky;top:52px;z-index:12}
.gh-label{position:sticky;left:0;z-index:14;min-width:400px;width:400px;border-right:1px solid #2a2a3a;padding:10px 16px;font-size:11px;color:#666;font-weight:600;letter-spacing:1px;text-transform:uppercase;background:#1a1a24}
.gh-months{flex:1;display:flex}
.gh-month{flex:1;min-width:180px;padding:10px 0;text-align:center;font-size:11px;font-weight:600;color:#666;letter-spacing:1px;text-transform:uppercase;border-right:1px solid #222}
.section-hdr{background:#08080e;padding:14px 16px 10px;font-size:12px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:#5ba3f5;border-bottom:2px solid #1e3a5f;border-top:3px solid #2a2a3a;position:relative}
.section-hdr-label{position:sticky;left:0;z-index:11;background:#08080e;padding-right:16px}
.task-row{display:flex;border-bottom:1px solid #1a1a24;align-items:stretch;min-height:52px;transition:background 0.15s}
.task-row:hover{background:#1c1c26}
.task-label{position:sticky;left:0;z-index:2;min-width:400px;width:400px;padding:8px 16px;display:flex;align-items:center;gap:10px;border-right:1px solid #2a2a3a;background:#16161d}
.task-row:hover .task-label{background:#1c1c26}
.task-name{font-size:13px;font-weight:500;color:#ccc}
.task-note{font-size:11px;color:#666;margin-top:2px}
.task-timeline{flex:1;position:relative}
.today-line{position:absolute;top:0;bottom:0;width:2px;background:#f05070;z-index:5;opacity:0.8}
.bar{height:28px;border-radius:6px;position:absolute;top:50%;transform:translateY(-50%);display:flex;align-items:center;justify-content:space-between;gap:8px;padding:0 10px;font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;cursor:pointer;transition:filter 0.15s;min-width:4px}
.bar-date{font-size:10px;opacity:.9;flex-shrink:0}
.bar:hover{filter:brightness(1.2);box-shadow:0 0 8px rgba(255,255,255,0.1)}
.bar.dragging{opacity:.9;box-shadow:0 0 16px rgba(91,163,245,.45)}
.bar .handle{position:absolute;top:0;bottom:0;width:14px;background:rgba(91,163,245,0.001);z-index:2}.bar .handle-left{left:0;cursor:ew-resize}.bar .handle-right{right:0;cursor:ew-resize}.bar .handle:hover{background:rgba(91,163,245,.18)}
.bar.complete{background:linear-gradient(90deg,#1a4a2e,#22663d);border:1px solid #2d8a52;color:#4dba78}
.bar.inprogress{background:linear-gradient(90deg,#3a2a10,#5a4010);border:1px solid #8a6420;color:#f0a830}
.bar.pending{background:linear-gradient(90deg,#1a1a3a,#252545);border:1px solid #353560;color:#7878c0}
.bar.critical{background:linear-gradient(90deg,#3a1020,#5a1830);border:1px solid #8a2040;color:#f05070}
.bar.blocked{background:linear-gradient(90deg,#3a2010,#5a3010);border:1px solid #8a5020;color:#f08030}
/* Editor panel */
.editor-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:50;justify-content:center;align-items:center}
.editor-overlay.active{display:flex}
.editor{background:#16161d;border:1px solid #3a3a5a;border-radius:16px;padding:32px;width:520px;max-width:95vw;max-height:90vh;overflow-y:auto}
.editor h2{font-size:18px;color:#fff;margin-bottom:4px}
.editor .task-id{font-size:12px;color:#666;margin-bottom:20px}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;background:#1e1e2e;border:1px solid #3a3a5a;color:#e8e8e8;padding:10px 14px;border-radius:8px;font-size:14px;font-family:inherit}
.field input:focus,.field select:focus,.field textarea:focus{outline:1px solid #5ba3f5}
.field textarea{resize:vertical;min-height:60px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.editor-actions{display:flex;gap:12px;margin-top:24px;justify-content:flex-end}
/* Bulk edit */
.bulk-bar{background:#16161d;border:1px solid #2a2a3a;border-radius:10px;padding:16px 20px;margin-bottom:20px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.bulk-bar label{font-size:12px;color:#888}
/* Unit info editor */
.unit-info{background:#16161d;border:1px solid #2a2a3a;border-radius:12px;padding:20px 24px;margin-bottom:20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px}
.unit-info .field{margin-bottom:0}
/* Handover + Notes */
.handover-panel{margin-top:24px;background:#16161d;border:1px solid #2d8a52;border-radius:12px;padding:20px 24px;display:flex;justify-content:space-between;align-items:center}
.handover-panel h3{color:#4dba78;font-size:16px}
.handover-panel p{color:#888;font-size:13px;margin-top:4px}
.handover-panel .hdate{font-size:22px;font-weight:700;color:#fff}
.notes-section{margin-top:24px;background:#16161d;border:1px solid #2a2a3a;border-radius:12px;padding:24px}
.notes-section h3{font-size:11px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.notes-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.note-card{background:#1a1a24;border:1px solid #2a2a3a;border-radius:8px;padding:14px 16px;cursor:pointer;transition:border-color 0.15s}
.note-card:hover{border-color:#5a5a9a}
.note-tag{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.note-tag.action{color:#f05070}
.note-tag.info{color:#5ba3f5}
.note-tag.warning{color:#f0a830}
.note-tag.done{color:#4dba78}
.note-card p{font-size:13px;color:#ccc;line-height:1.5}
.note-add{background:none;border:1px dashed #3a3a5a;color:#888;padding:14px 16px;border-radius:8px;cursor:pointer;font-size:13px;text-align:center;transition:all 0.15s}
.note-add:hover{border-color:#5ba3f5;color:#5ba3f5}
/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:#1a4a2e;color:#4dba78;padding:14px 24px;border-radius:10px;border:1px solid #2d8a52;font-size:14px;font-weight:600;z-index:100;transform:translateY(100px);opacity:0;transition:all 0.3s}
.toast.show{transform:translateY(0);opacity:1}
.toast.error{background:#3a1020;color:#f05070;border-color:#8a2040}
.drag-tooltip{display:none;position:fixed;background:#1e1e2e;border:1px solid #3a3a5a;border-radius:8px;padding:10px 12px;font-size:12px;color:#ddd;z-index:120;pointer-events:none}
/* Nav bar */
.nav-bar{background:#16161d;border-bottom:1px solid #2a2a3a;padding:10px 32px;display:flex;gap:10px;align-items:center;position:sticky;top:0;z-index:20}
.btn-nav{background:#1e1e2e;color:#aaa;border-color:#3a3a5a;padding:6px 16px}
.btn-nav:hover{background:#2a2a4a;color:#fff}
.btn-today{background:#1e3a5f;color:#5ba3f5;border-color:#2a5080;padding:6px 16px}
.btn-today:hover{background:#2a5080}
.nav-range{font-size:12px;color:#666;margin-left:auto}
.empty-state{text-align:center;padding:80px 32px;color:#555}
.empty-state h2{font-size:24px;margin-bottom:12px;color:#888}
.empty-state p{font-size:14px;max-width:400px;margin:0 auto}
@media(max-width:768px){
  header{padding:16px}
  .container{padding:16px}
  .stats{grid-template-columns:repeat(2,1fr)}
  .task-label{min-width:220px;width:220px}
  .gh-label{min-width:220px;width:220px}
  .unit-info{grid-template-columns:1fr}
}
/* Client readonly mode */
body.readonly-mode .bar{cursor:default!important;pointer-events:none}
body.readonly-mode .note-card{cursor:default!important;pointer-events:none}
body.readonly-mode .note-add{display:none!important}
body.readonly-mode .field input,body.readonly-mode .field textarea{pointer-events:none;opacity:0.8}
body.readonly-mode .task-label{cursor:default!important}
body.readonly-mode .btn{display:none!important}
body.readonly-mode .lang-btn{display:block!important}
</style>
</head>
<body>

<header>
<div>
  <h1 id="uiTitle">Galatsi — Construction Timeline Editor</h1>
  <div class="sub" id="uiSub">Ipeirou 22, Galatsi</div>
</div>
<div class="header-right">
  <select id="unitSelect"><option value="">— Select Unit —</option></select>
  <button class="btn btn-save" onclick="saveData()" title="Save to JSON">💾 Save</button>
  <button class="btn btn-primary" onclick="exportJSON()" title="Download JSON">⬇ Export</button>
  <label class="btn btn-primary" style="margin:0" title="Import JSON">⬆ Import<input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)"></label>
  <button class="lang-btn" id="langBtn" onclick="toggleLang()">GR Ελληνικά</button>
</div>
</header>

<div class="nav-bar" id="navBar" style="display:none">
  <button class="btn btn-nav" id="navPrev" onclick="scrollByMonth(-1)">◂ Prev Month</button>
  <button class="btn btn-today" id="navToday" onclick="scrollToToday()">● Today</button>
  <button class="btn btn-nav" id="navNext" onclick="scrollByMonth(1)">Next Month ▸</button>
  <span class="nav-range" id="navRange"></span>
</div>

<div id="app">
  <div class="empty-state">
    <h2>Select a Unit</h2>
    <p>Choose a unit from the dropdown above to view and edit its construction timeline.</p>
  </div>
</div>

<!-- Task Editor Modal -->
<div class="editor-overlay" id="editorOverlay">
  <div class="editor">
    <h2 id="edTitle">Edit Task</h2>
    <div class="task-id" id="edTaskId"></div>
    <div class="field">
      <label id="edStatusLbl">Status</label>
      <select id="edStatus">
        <option value="pending">Pending / Scheduled</option>
        <option value="inprogress">In Progress</option>
        <option value="complete">Complete</option>
        <option value="critical">Critical Path</option>
        <option value="blocked">Blocked</option>
      </select>
    </div>
    <div class="field-row">
      <div class="field">
        <label id="edStartLbl">Start Date</label>
        <input type="date" id="edStart">
      </div>
      <div class="field">
        <label id="edEndLbl">End Date</label>
        <input type="date" id="edEnd">
      </div>
    </div>
    <div class="field">
      <label id="edNotesLbl">Notes</label>
      <textarea id="edNotes" placeholder="Task notes..."></textarea>
    </div>
    <div class="editor-actions">
      <button class="btn btn-danger" id="clearDatesBtn" onclick="clearTask()">Clear Dates</button>
      <button class="btn btn-primary" id="cancelTaskBtn" onclick="closeEditor()">Cancel</button>
      <button class="btn btn-save" id="saveTaskBtn" onclick="saveTask()">Save</button>
    </div>
  </div>
</div>

<!-- Notes Editor Modal -->
<div class="editor-overlay" id="noteOverlay">
  <div class="editor">
    <h2 id="noteEdTitle">Edit Note</h2>
    <div class="field">
      <label id="noteLabelLbl">Label</label>
      <input id="noteEdLabel" placeholder="e.g. Action Required, Pending Decision...">
    </div>
    <div class="field">
      <label id="noteTypeLbl">Type</label>
      <select id="noteEdType">
        <option value="info">Info (blue)</option>
        <option value="action">Action Required (red)</option>
        <option value="warning">Warning (orange)</option>
        <option value="done">Done (green)</option>
      </select>
    </div>
    <div class="field">
      <label id="noteTextLbl">Note</label>
      <textarea id="noteEdText" placeholder="Project note..." rows="4"></textarea>
    </div>
    <div class="editor-actions">
      <button class="btn btn-danger" id="noteDeleteBtn" onclick="deleteNote()" style="display:none">Delete</button>
      <button class="btn btn-primary" id="cancelNoteBtn" onclick="closeNoteEditor()">Cancel</button>
      <button class="btn btn-save" id="saveNoteBtn" onclick="saveNote()">Save</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>
<div class="drag-tooltip" id="dragTooltip"></div>

<script>
// ── Data ──
var DATA = null;
var CURRENT_UNIT = null;
var EDITING_TASK = null;
var DATA_URL = 'luminara-units.json';
var DATA_KEY = 'galatsi-timeline-data';

// ── Config ──
var TS = new Date('2026-01-01');
var TE = new Date('2026-12-31');
var TD = (TE - TS) / 86400000;
var MONTHS = [];

function buildInitialMonths(){
  MONTHS = [];
  var d = new Date(TS.getFullYear(), TS.getMonth(), 1);
  var endMonth = new Date(TE.getFullYear(), TE.getMonth(), 1);
  while(d <= endMonth){
    MONTHS.push(d.toLocaleDateString('en-GB',{month:'short',year:'numeric'}));
    d.setMonth(d.getMonth() + 1);
  }
}
buildInitialMonths();

function lft(d){return(((new Date(d)-TS)/86400000)/TD*100).toFixed(2)+'%';}
function wid(s,e){return(((new Date(e)-new Date(s))/86400000)/TD*100).toFixed(2)+'%';}
function pct(d){return((new Date(d)-TS)/86400000/TD*100).toFixed(2);}
function fmt(d){return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short'});}
function todayPct(){return pct(new Date());}

// ── Init ──
function init(){
  // Check for ?gaia=1 URL param (client read-only mode)
  var params = new URLSearchParams(window.location.search);
  var gaiaMode = params.get('gaia') === '1';
  window.IS_READONLY = true; // Lock all editing when client mode
  // Load from server API first, fall back to localStorage, then file
  fetch(DATA_URL)
    .then(function(r){return r.json();})
    .then(function(data){
      DATA = data;
      localStorage.setItem(DATA_KEY, JSON.stringify(DATA));
      if(gaiaMode){
        CURRENT_UNIT = '5a'; // Gaia client's unit
        document.getElementById('unitSelect') && (document.getElementById('unitSelect').style.display='none');
        document.getElementById('saveBtn') && (document.getElementById('saveBtn').style.display='none');
        document.getElementById('exportBtn') && (document.getElementById('exportBtn').style.display='none');
        document.getElementById('importBtn') && (document.getElementById('importBtn').style.display='none');
        document.body.classList.add('readonly-mode');
        document.querySelector('h1').textContent = 'Gaia — Unit 5A Timeline';
        document.getElementById('uiSub').textContent = 'Ipeirou 22, Galatsi | Private Client Portal';
        renderUnit('5a');
      } else {
        populateSelect();
        toast('Loaded editor');
      }
    })
    .catch(function(){
      var saved = localStorage.getItem(DATA_KEY);
      if(saved){
        try{
          DATA = JSON.parse(saved);
          if(gaiaMode){ CURRENT_UNIT='5a'; document.getElementById('unitSelect')&&(document.getElementById('unitSelect').style.display='none'); document.getElementById('saveBtn')&&(document.getElementById('saveBtn').style.display='none'); document.getElementById('exportBtn')&&(document.getElementById('exportBtn').style.display='none'); document.getElementById('importBtn')&&(document.getElementById('importBtn').style.display='none'); document.body.classList.add('readonly-mode'); document.querySelector('h1').textContent='Gaia — Unit 5A Timeline'; document.getElementById('uiSub').textContent='Ipeirou 22, Galatsi | Private Client Portal'; renderUnit('5a'); }
          else { populateSelect(); toast('Loaded from local cache'); }
          return;
        }catch(e){}
      }
      fetch(DATA_URL)
        .then(function(r){return r.json();})
        .then(function(data){
          DATA = data;
          if(gaiaMode){ CURRENT_UNIT='5a'; document.getElementById('unitSelect')&&(document.getElementById('unitSelect').style.display='none'); document.getElementById('saveBtn')&&(document.getElementById('saveBtn').style.display='none'); document.getElementById('exportBtn')&&(document.getElementById('exportBtn').style.display='none'); document.getElementById('importBtn')&&(document.getElementById('importBtn').style.display='none'); document.body.classList.add('readonly-mode'); document.querySelector('h1').textContent='Gaia — Unit 5A Timeline'; document.getElementById('uiSub').textContent='Ipeirou 22, Galatsi | Private Client Portal'; renderUnit('5a'); }
          else populateSelect();
        })
        .catch(function(){
          document.getElementById('app').innerHTML = '<div class="empty-state"><h2>Load Error</h2><p>Could not load data. Use Import to load a file.</p></div>';
        });
    });
}

function populateSelect(){
  var sel = document.getElementById('unitSelect');
  sel.innerHTML = '<option value="">— Select Unit —</option>';
  var ids = Object.keys(DATA.units);
  for(var i=0;i<ids.length;i++){
    var u = DATA.units[ids[i]];
    var label = u.name + ' (Floor ' + u.floor + ', ' + (u.size_m2||'?') + ' m²)';
    var opt = document.createElement('option');
    opt.value = ids[i];
    opt.textContent = label;
    sel.appendChild(opt);
  }
  sel.onchange = function(){
    if(sel.value){renderUnit(sel.value);}
    else{document.getElementById('app').innerHTML='<div class="empty-state"><h2>Select a Unit</h2><p>Choose a unit from the dropdown above.</p></div>';}
  };
}

// ── Render Unit ──
function renderUnit(uid){
  CURRENT_UNIT = uid;
  var unit = DATA.units[uid];
  var tmpl = DATA.taskTemplate;
  var tasks = unit.tasks || {};
  var tp = todayPct();

  // Count statuses
  var counts={complete:0,inprogress:0,pending:0,blocked:0,critical:0,total:0};
  var taskIds = Object.keys(tasks);
  for(var i=0;i<taskIds.length;i++){
    var st = tasks[taskIds[i]].st||'pending';
    if(counts[st]!==undefined) counts[st]++;
    counts.total++;
  }
  // Per-task weighted progress
  var tw = DATA.taskWeights || {};
  var pctComplete = 0;
  for(var tid in tw){
    if(!tasks[tid]) continue;
    var st = tasks[tid].st || 'pending';
    if(st==='complete') pctComplete += tw[tid];
    else if(st==='inprogress') pctComplete += tw[tid]*0.5;
  }
  pctComplete = Math.round(pctComplete);

  var html = '';

  // Unit info editor
  html += '<div class="container"><div class="unit-info">';
  html += '<div class="field"><label id="unitNameLbl">Unit Name</label><input id="unitNameVal" value="'+esc(unit.name)+'" onchange="updateUnitField(\'name\',this.value)"></div>';
  html += '<div class="field"><label id="unitClientLbl">Client</label><input id="unitClientVal" value="'+esc(unit.client)+'" onchange="updateUnitField(\'client\',this.value)"></div>';
  html += '<div class="field"><label id="unitFloorLbl">Floor</label><input id="unitFloorVal" value="'+esc(unit.floor)+'" onchange="updateUnitField(\'floor\',this.value)"></div>';
  html += '<div class="field"><label id="unitSizeLbl">Size (m²)</label><input id="unitSizeVal" type="number" value="'+(unit.size_m2||'')+'" onchange="updateUnitField(\'size_m2\',this.value?parseInt(this.value):null)"></div>';
  html += '<div class="field"><label id="unitHandoverLbl">Handover</label><input id="unitHandoverVal" value="'+esc(unit.handover)+'" onchange="updateUnitField(\'handover\',this.value)"></div>';
  html += '<div class="field"><label id="unitHandoverDateLbl">Handover Date</label><input id="unitHandoverDateVal" type="date" value="'+(unit.handoverDate||'')+'" onchange="updateUnitField(\'handoverDate\',this.value||null)"></div>';
  html += '</div>';

  // Stats
  html += '<div class="stats">';
  html += '<div class="stat"><div class="slabel" data-i18n="progress">Progress</div><div class="svalue" style="color:'+(pctComplete>=80?'#4dba78':pctComplete>=40?'#f0a830':'#7878c0')+'">'+pctComplete+'%</div><div class="ssub">'+counts.complete+' of '+counts.total+' tasks</div></div>';
  html += '<div class="stat"><div class="slabel" data-i18n="inprogress">'+(LANG==='el'?'Σε Εξέλιξη':'In Progress')+'</div><div class="svalue" style="color:#f0a830">'+counts.inprogress+'</div><div class="ssub" data-i18n="activeTrades">'+(LANG==='el'?'Ενεργά συνεργεία':'Active trades')+'</div></div>';

// ── Task Editor ──
function openEditor(taskId){
  if(!CURRENT_UNIT) return;
  EDITING_TASK = taskId;
  var unit = DATA.units[CURRENT_UNIT];
  var task = (unit.tasks||{})[taskId] || {};
  var tmpl = DATA.taskTemplate.filter(function(t){return t.id===taskId;})[0];

  document.getElementById('edTitle').textContent = tmpl ? tmpl.nm : taskId;
  document.getElementById('edTaskId').textContent = 'ID: ' + taskId;
  document.getElementById('edStatus').value = task.st || 'pending';
  document.getElementById('edStart').value = task.s || '';
  document.getElementById('edEnd').value = task.e || '';
  document.getElementById('edNotes').value = task.nt || '';

  document.getElementById('editorOverlay').classList.add('active');
}

function closeEditor(){
  document.getElementById('editorOverlay').classList.remove('active');
  EDITING_TASK = null;
}

function saveTask(){
  if(!CURRENT_UNIT || !EDITING_TASK) return;
  if(!DATA.units[CURRENT_UNIT].tasks) DATA.units[CURRENT_UNIT].tasks = {};

  var s = document.getElementById('edStart').value;
  var e = document.getElementById('edEnd').value;
  var st = document.getElementById('edStatus').value;
  var nt = document.getElementById('edNotes').value;

  if(s && e && new Date(e) < new Date(s)){
    toast('End date must be after start date', true);
    return;
  }

  var expanded = false;
  if(s) expanded = ensureTimelineRange(s) || expanded;
  if(e) expanded = ensureTimelineRange(e) || expanded;

  DATA.units[CURRENT_UNIT].tasks[EDITING_TASK] = {
    st: st,
    s: s,
    e: e,
    nt: nt || 'TBD'
  };

  closeEditor();
  renderUnit(CURRENT_UNIT);
  autoSave();
  toast('Task saved');
}

function clearTask(){
  if(!CURRENT_UNIT || !EDITING_TASK) return;
  delete DATA.units[CURRENT_UNIT].tasks[EDITING_TASK];
  closeEditor();
  renderUnit(CURRENT_UNIT);
  autoSave();
  toast('Task cleared');
}

// ── Note Editor ──
var EDITING_NOTE = null;

function openNoteEditor(noteKey){
  if(!CURRENT_UNIT) return;
  var unit = DATA.units[CURRENT_UNIT];
  if(!unit.notes) unit.notes = {};
  EDITING_NOTE = noteKey || null;

  var noteTypes = {action:'action',paint:'warning',facade:'warning',ev:'info',smartHome:'info',leed:'info'};
  var noteLabels = {action:'Action Required',paint:'Pending Decision',facade:'Pending Decision',ev:'EV Charging',smartHome:'Smart Home',leed:'LEED Platinum'};

  if(noteKey && unit.notes[noteKey]){
    document.getElementById('noteEdTitle').textContent = 'Edit Note';
    document.getElementById('noteEdLabel').value = noteLabels[noteKey] || noteKey;
    document.getElementById('noteEdType').value = noteTypes[noteKey] || 'info';
    document.getElementById('noteEdText').value = unit.notes[noteKey];
    document.getElementById('noteDeleteBtn').style.display = '';
  } else {
    document.getElementById('noteEdTitle').textContent = 'Add Note';
    document.getElementById('noteEdLabel').value = '';
    document.getElementById('noteEdType').value = 'info';
    document.getElementById('noteEdText').value = '';
    document.getElementById('noteDeleteBtn').style.display = 'none';
  }
  document.getElementById('noteOverlay').classList.add('active');
}

function closeNoteEditor(){
  document.getElementById('noteOverlay').classList.remove('active');
  EDITING_NOTE = null;
}

function saveNote(){
  if(!CURRENT_UNIT) return;
  var label = document.getElementById('noteEdLabel').value.trim();
  var type = document.getElementById('noteEdType').value;
  var text = document.getElementById('noteEdText').value.trim();
  if(!label || !text){
    toast('Label and note text required', true);
    return;
  }
  if(!DATA.units[CURRENT_UNIT].notes) DATA.units[CURRENT_UNIT].notes = {};

  // If editing existing, delete old key first
  if(EDITING_NOTE){
    delete DATA.units[CURRENT_UNIT].notes[EDITING_NOTE];
  }

  // Use label as key (lowercase, no spaces)
  var key = label.toLowerCase().replace(/[^a-z0-9]/g,'').substring(0,20) || ('note'+Date.now());
  DATA.units[CURRENT_UNIT].notes[key] = text;

  // Store label/type mapping in a meta object
  if(!DATA.units[CURRENT_UNIT]._noteMeta) DATA.units[CURRENT_UNIT]._noteMeta = {};
  DATA.units[CURRENT_UNIT]._noteMeta[key] = {label: label, type: type};

  closeNoteEditor();
  renderUnit(CURRENT_UNIT);
  autoSave();
  saveData();
  toast('Note saved');
}

function deleteNote(){
  if(!CURRENT_UNIT || !EDITING_NOTE) return;
  delete DATA.units[CURRENT_UNIT].notes[EDITING_NOTE];
  if(DATA.units[CURRENT_UNIT]._noteMeta) delete DATA.units[CURRENT_UNIT]._noteMeta[EDITING_NOTE];
  closeNoteEditor();
  renderUnit(CURRENT_UNIT);
  autoSave();
  toast('Note deleted');
}

// ── Save / Load ──
function autoSave(){
  try{localStorage.setItem('galatsi-timeline-data', JSON.stringify(DATA));}catch(e){}
}

function saveData(){
  fetch('/api/save', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(DATA)
  })
  .then(function(r){return r.json();})
  .then(function(result){
    if(result.error){
      toast('Save failed: ' + result.error, true);
    } else {
      localStorage.setItem(DATA_KEY, JSON.stringify(DATA));
      toast('Saved to server — ' + result.units + ' units');
    }
  })
  .catch(function(err){
    // Fallback: download as file
    toast('Server save failed — downloading file instead', true);
    var blob = new Blob([JSON.stringify(DATA, null, 2)], {type:'application/json'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'luminara-units.json';
    a.click();
  });
}

function exportJSON(){
  saveData();
}

function importJSON(event){
  var file = event.target.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e){
    try{
      DATA = JSON.parse(e.target.result);
      localStorage.setItem('galatsi-timeline-data', JSON.stringify(DATA));
      populateSelect();
      if(CURRENT_UNIT && DATA.units[CURRENT_UNIT]) renderUnit(CURRENT_UNIT);
      toast('JSON imported successfully');
    }catch(err){
      toast('Invalid JSON file', true);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ── Timeline Navigation ──
function scrollToToday(){
  var wrap = document.querySelector('.gantt-wrap');
  if(!wrap) return;
  var todayLine = wrap.querySelector('.today-line');
  if(todayLine){
    var barRect = wrap.getBoundingClientRect();
    var lineLeft = todayLine.offsetLeft;
    wrap.scrollTo({left: lineLeft - barRect.width/2, behavior: 'smooth'});
  }
}

function scrollByMonth(dir){
  var wrap = document.querySelector('.gantt-wrap');
  if(!wrap) return;
  // Each month is roughly the timeline width / number of months
  var months = wrap.querySelector('.gh-months');
  if(months && months.children.length > 0){
    var monthWidth = months.children[0].offsetWidth;
    wrap.scrollBy({left: dir * monthWidth, behavior: 'smooth'});
  }
}

function updateNavRange(){
  var rangeEl = document.getElementById('navRange');
  if(!rangeEl) return;
  var startDate = TS.toLocaleDateString('en-GB',{month:'short',year:'numeric'});
  var endDate = TE.toLocaleDateString('en-GB',{month:'short',year:'numeric'});
  rangeEl.textContent = startDate + ' — ' + endDate;
}

// ── Auto-Expand Timeline ──
function ensureTimelineRange(dateStr){
  if(!dateStr) return false;
  var d = new Date(dateStr);
  var expanded = false;
  if(d < TS){
    // Extend start by going back 2 months
    TS = new Date(d.getFullYear(), d.getMonth() - 1, 1);
    TD = (TE - TS) / 86400000;
    expanded = true;
  }
  if(d > TE){
    // Extend end by adding 3 months
    TE = new Date(d.getFullYear(), d.getMonth() + 4, 0);
    TD = (TE - TS) / 86400000;
    expanded = true;
  }
  if(expanded){
    rebuildMonths();
    updateNavRange();
    // Expand the gantt-inner min-width
    var inner = document.querySelector('.gantt-inner');
    if(inner) inner.style.minWidth = (MONTHS.length * 180) + 'px';
  }
  return expanded;
}

function rebuildMonths(){
  MONTHS = [];
  var d = new Date(TS.getFullYear(), TS.getMonth(), 1);
  var endMonth = new Date(TE.getFullYear(), TE.getMonth(), 1);
  while(d <= endMonth){
    MONTHS.push(d.toLocaleDateString('en-GB',{month:'short',year:'numeric'}));
    d.setMonth(d.getMonth() + 1);
  }
}

// ── Drag scroll on timeline ──
function enableDragScroll(){
  if(window.IS_READONLY) return; // No drag scrolling for client mode (normal scroll works)
  var wrap=document.querySelector('.gantt-wrap');
  if(!wrap) return;
  var isDown=false,startX=0,scrollLeft=0,target=null;
  wrap.addEventListener('mousedown',function(e){
    if(e.target.closest('.bar')||e.target.closest('.note-card')||e.target.closest('input')||e.target.closest('textarea')||e.target.closest('select')||e.target.closest('button')) return;
    isDown=true; target=wrap; startX=e.pageX-wrap.offsetLeft; scrollLeft=wrap.scrollLeft; wrap.style.cursor='grabbing';
  });
  window.addEventListener('mouseup',function(){isDown=false; if(wrap) wrap.style.cursor='auto';});
  wrap.addEventListener('mouseleave',function(){isDown=false; wrap.style.cursor='auto';});
  wrap.addEventListener('mousemove',function(e){
    if(!isDown) return; e.preventDefault(); var x=e.pageX-wrap.offsetLeft; var walk=(x-startX)*1.2; wrap.scrollLeft=scrollLeft-walk;
  });
}



// ── Drag/resize bars ──
var BAR_DRAG=null;
function showDragTip(x,y,text){var t=document.getElementById('dragTooltip'); if(!t) return; t.style.display='block'; t.style.left=(x+14)+'px'; t.style.top=(y-10)+'px'; t.innerHTML=text;}
function hideDragTip(){var t=document.getElementById('dragTooltip'); if(t) t.style.display='none';}
function startBarDrag(bar,e){
  var timeline=bar.parentElement;
  var rect=timeline.getBoundingClientRect();
  var dayMs=86400000;
  var start=new Date(bar.dataset.start||'');
  var end=new Date(bar.dataset.end||'');
  if(!bar.dataset.start||!bar.dataset.end||String(start)==='Invalid Date'||String(end)==='Invalid Date') return;
  var mode='move';
  if(e.target.classList.contains('handle-left')) mode='resize-left';
  else if(e.target.classList.contains('handle-right')) mode='resize-right';
  BAR_DRAG={bar:bar,tid:bar.dataset.tid,rect:rect,startX:e.clientX,startY:e.clientY,origStart:start,origEnd:end,mode:mode,moved:false};
  document.addEventListener('mousemove',onBarDrag);
  document.addEventListener('mouseup',endBarDrag);
}
function onBarDrag(e){
  if(!BAR_DRAG) return;
  var dayMs=86400000;
  var dx=e.clientX-BAR_DRAG.startX;
  if(Math.abs(dx) < 4 && !BAR_DRAG.moved) return;
  BAR_DRAG.moved=true;
  var pctDelta=dx/BAR_DRAG.rect.width;
  var daysDelta=Math.round(pctDelta*TD);
  var ns=new Date(BAR_DRAG.origStart.getTime());
  var ne=new Date(BAR_DRAG.origEnd.getTime());
  if(BAR_DRAG.mode==='move'){
    ns=new Date(BAR_DRAG.origStart.getTime()+daysDelta*dayMs);
    ne=new Date(BAR_DRAG.origEnd.getTime()+daysDelta*dayMs);
  } else if(BAR_DRAG.mode==='resize-left'){
    ns=new Date(BAR_DRAG.origStart.getTime()+daysDelta*dayMs);
    if(ns>=ne) ns=new Date(ne.getTime()-dayMs);
  } else {
    ne=new Date(BAR_DRAG.origEnd.getTime()+daysDelta*dayMs);
    if(ne<=ns) ne=new Date(ns.getTime()+dayMs);
  }
  BAR_DRAG.bar.style.left='calc('+lft(ns.toISOString().slice(0,10))+' + 2px)';
  BAR_DRAG.bar.style.width='calc('+wid(ns.toISOString().slice(0,10),ne.toISOString().slice(0,10))+' - 4px)';
  BAR_DRAG.bar.dataset.start=ns.toISOString().slice(0,10);
  BAR_DRAG.bar.dataset.end=ne.toISOString().slice(0,10);
  var bd=BAR_DRAG.bar.querySelector('.bar-date'); if(bd) bd.textContent=fmt(ns.toISOString().slice(0,10))+' → '+fmt(ne.toISOString().slice(0,10));
  showDragTip(e.clientX,e.clientY,'<strong>'+fmt(ns.toISOString().slice(0,10))+'</strong> → <strong>'+fmt(ne.toISOString().slice(0,10))+'</strong>');
}
function endBarDrag(e){
  if(!BAR_DRAG) return;
  var tid=BAR_DRAG.tid, bar=BAR_DRAG.bar, moved=BAR_DRAG.moved;
  document.removeEventListener('mousemove',onBarDrag);
  document.removeEventListener('mouseup',endBarDrag);
  hideDragTip();
  if(!moved){
    BAR_DRAG=null;
    if(tid) openEditor(tid);
    return;
  }
  if(CURRENT_UNIT && tid && DATA.units[CURRENT_UNIT] && DATA.units[CURRENT_UNIT].tasks && DATA.units[CURRENT_UNIT].tasks[tid]){
    DATA.units[CURRENT_UNIT].tasks[tid].s=bar.dataset.start;
    DATA.units[CURRENT_UNIT].tasks[tid].e=bar.dataset.end;
    autoSave();
    saveData();
    toast('Timeline updated');
  }
  BAR_DRAG=null;
}
function enableBarDrag(){
  if(window.IS_READONLY) return; // No drag editing for client mode
  document.querySelectorAll('.bar').forEach(function(bar){
    bar.style.cursor='grab';
    bar.onmousedown=function(e){ e.stopPropagation(); e.preventDefault(); startBarDrag(bar,e); };
  });
}
// ── Start ──
init();
</script>
