<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galatsi Residence — Construction Timeline</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f13;color:#e8e8e8}
header{background:#16161d;border-bottom:1px solid #2a2a3a;padding:20px 32px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
header h1{font-size:20px;font-weight:600;color:#fff}
.sub{font-size:13px;color:#888;margin-top:4px}
.header-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.badge{background:#1e3a5f;color:#5ba3f5;font-size:12px;padding:6px 14px;border-radius:20px;border:1px solid #2a5080}
select{background:#1e1e2e;border:1px solid #3a3a5a;color:#e8e8e8;padding:8px 16px;border-radius:8px;font-size:14px;cursor:pointer;min-width:180px}
select:focus{outline:1px solid #5ba3f5}
.btn{padding:8px 20px;border-radius:8px;border:1px solid;cursor:pointer;font-size:13px;font-weight:600;transition:all 0.2s}
.btn-primary{background:#1e3a5f;color:#5ba3f5;border-color:#2a5080}
.btn-primary:hover{background:#2a5080}
.btn-save{background:#1a4a2e;color:#4dba78;border-color:#2d8a52}
.btn-save:hover{background:#22663d}
.btn-danger{background:#3a1020;color:#f05070;border-color:#8a2040}
.btn-danger:hover{background:#5a1830}
.lang-btn{background:#1e1e2e;border:1px solid #3a3a5a;color:#aaa;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;transition:all 0.2s}
.lang-btn:hover{background:#2a2a4a;color:#fff}
.container{padding:24px 32px;max-width:1600px;margin:0 auto}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.stat{background:#16161d;border:1px solid #2a2a3a;border-radius:10px;padding:14px 18px}
.stat .slabel{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:1px}
.stat .svalue{font-size:22px;font-weight:700;color:#fff;margin-top:4px}
.stat .ssub{font-size:12px;color:#888;margin-top:2px}
.legend{display:flex;gap:20px;margin-bottom:20px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:8px;font-size:12px;color:#aaa}
.legend-dot{width:12px;height:12px;border-radius:3px}
.gantt-wrap{background:#16161d;border:1px solid #2a2a3a;border-radius:12px;overflow-x:auto;overflow-y:visible;cursor:grab}
.gantt-inner{min-width:1800px}
.gantt-header-row{display:flex;background:#1a1a24;border-bottom:1px solid #2a2a3a;position:sticky;top:0;z-index:12;height:42px}
.gh-label{position:sticky;left:0;z-index:14;min-width:320px;width:320px;border-right:1px solid #2a2a3a;padding:10px 16px;font-size:11px;color:#666;font-weight:600;letter-spacing:1px;text-transform:uppercase;background:#1a1a24;flex-shrink:0}
.gh-months{flex:1;display:block;position:relative;height:42px;overflow:visible}
.gh-month{position:absolute;top:0;height:42px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#5ba3f5;letter-spacing:1px;text-transform:uppercase;border-right:2px solid #3a3a5a;background:#1a1a24;overflow:visible}
.section-hdr{background:#08080e;padding:12px 16px;font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#5ba3f5;border-bottom:2px solid #1e3a5f;border-top:3px solid #2a2a3a}
.section-hdr-label{position:sticky;left:0;z-index:11;background:#08080e;padding-right:16px}
.task-row{display:flex;border-bottom:1px solid #1e1e28;align-items:stretch;min-height:52px;transition:background 0.15s}
.task-row:hover{background:#1c1c26}
.task-label{position:sticky;left:0;z-index:2;min-width:320px;width:320px;padding:8px 16px;display:flex;align-items:center;gap:8px;border-right:1px solid #2a2a3a;background:#16161d}
.task-row:hover .task-label{background:#1c1c26}
.task-icon{font-size:16px;flex-shrink:0}
.task-name{font-size:13px;font-weight:500;color:#ccc}
.task-note{font-size:11px;color:#666;margin-top:2px}
.task-timeline{flex:1;position:relative}
.task-timeline::before{content:'';position:absolute;top:0;bottom:0;left:0;right:0;pointer-events:none;z-index:1}
/* Month grid lines */
.month-grid-line{position:absolute;top:0;bottom:0;width:1px;background:#3a3a5a;z-index:1}
.today-line{position:absolute;top:0;bottom:0;width:2px;background:#f05070;z-index:5;opacity:0.8}
.bar{height:28px;border-radius:6px;position:absolute;top:50%;transform:translateY(-50%);display:flex;align-items:center;justify-content:center;gap:8px;padding:0 10px;font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;cursor:pointer;transition:filter 0.15s;min-width:4px}
.bar-date{font-size:10px;opacity:1;color:#4dba78;text-align:center}
.bar-date-external{color:#4dba78}
.bar:hover{filter:brightness(1.2);box-shadow:0 0 8px rgba(255,255,255,0.1)}
.bar.dragging{opacity:.9;box-shadow:0 0 16px rgba(91,163,245,.45)}
.bar .handle{position:absolute;top:0;bottom:0;width:14px;background:rgba(91,163,245,0.001);z-index:2}
.bar .handle-left{left:0;cursor:ew-resize}
.bar .handle-right{right:0;cursor:ew-resize}
.bar .handle:hover{background:rgba(91,163,245,.18)}
.bar.complete{background:linear-gradient(90deg,#1a4a2e,#22663d);border:1px solid #2d8a52;color:#4dba78}
.bar.inprogress{background:linear-gradient(90deg,#3a2a10,#5a4010);border:1px solid #8a6420;color:#f0a830}
.bar.pending{background:linear-gradient(90deg,#1a1a3a,#252545);border:1px solid #353560;color:#7878c0}
.bar.critical{background:linear-gradient(90deg,#3a1020,#5a1830);border:1px solid #8a2040;color:#f05070}
.bar.blocked{background:linear-gradient(90deg,#3a2010,#5a3010);border:1px solid #8a5020;color:#f08030}
.bar.ordered{background:linear-gradient(90deg,#0d3320,#14512e);border:1px solid #1d7a44;color:#3ddc6e}
/* Procurement grid */
.procurement-grid{margin-bottom:24px;background:#16161d;border:1px solid #1d7a44;border-radius:12px;padding:20px 24px}
.procurement-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.procurement-title{font-size:11px;color:#3ddc6e;text-transform:uppercase;letter-spacing:1.5px;font-weight:700}
.procurement-sub{font-size:13px;color:#888;margin-top:4px}
.procurement-badge{background:#0d3320;border:1px solid #1d7a44;border-radius:20px;padding:6px 16px;font-size:13px;font-weight:700;color:#3ddc6e}
.procurement-items{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.procurement-item{background:#0d2018;border:1px solid #1d7a44;border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:10px}
.procurement-check{color:#3ddc6e;font-size:16px}
.procurement-item-name{font-size:13px;font-weight:500;color:#ccc}
.procurement-item-note{font-size:11px;color:#666;margin-top:2px}
/* Handover panel */
.handover-panel{margin-top:24px;background:#16161d;border:1px solid #2d8a52;border-radius:12px;padding:20px 24px;display:flex;justify-content:space-between;align-items:center}
.handover-panel h3{color:#4dba78;font-size:16px}
.handover-panel p{color:#888;font-size:13px;margin-top:4px}
.handover-panel .hdate{font-size:22px;font-weight:700;color:#fff}
/* Notes section */
.notes-section{margin-top:24px;background:#16161d;border:1px solid #2a2a3a;border-radius:12px;padding:24px}
.notes-section h3{font-size:11px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.notes-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.note-card{background:#1a1a24;border:1px solid #2a2a3a;border-radius:8px;padding:14px 16px;cursor:pointer;transition:border-color 0.15s}
.note-card:hover{border-color:#5a5a9a}
.note-tag{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.note-tag.action{color:#f05070}
.note-tag.info{color:#5ba3f5}
.note-tag.warning{color:#f0a830}
.note-tag.done{color:#4dba78}
.note-card p{font-size:13px;color:#ccc;line-height:1.5}
.note-add{background:none;border:1px dashed #3a3a5a;color:#888;padding:14px 16px;border-radius:8px;cursor:pointer;font-size:13px;text-align:center;transition:all 0.15s}
.note-add:hover{border-color:#5ba3f5;color:#5ba3f5}
.notes-custom{margin-top:16px}
.notes-custom textarea{width:100%;background:#1a1a24;border:1px solid #2a2a3a;border-radius:8px;padding:12px 14px;color:#ccc;font-size:13px;font-family:inherit;resize:vertical;min-height:80px;outline:none}
.notes-custom textarea:focus{border-color:#5a5a9a}
/* Editor modals */
.editor-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:50;justify-content:center;align-items:center}
.editor-overlay.active{display:flex}
.editor{background:#16161d;border:1px solid #3a3a5a;border-radius:16px;padding:32px;width:520px;max-width:95vw;max-height:90vh;overflow-y:auto}
.editor h2{font-size:18px;color:#fff;margin-bottom:4px}
.editor .task-id{font-size:12px;color:#666;margin-bottom:20px}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;background:#1e1e2e;border:1px solid #3a3a5a;color:#e8e8e8;padding:10px 14px;border-radius:8px;font-size:14px;font-family:inherit}
.field input:focus,.field select:focus,.field textarea:focus{outline:1px solid #5ba3f5}
.field textarea{resize:vertical;min-height:60px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.editor-actions{display:flex;gap:12px;margin-top:24px;justify-content:flex-end}
/* Nav bar */
.nav-bar{background:#16161d;border-bottom:1px solid #2a2a3a;padding:10px 32px;display:flex;gap:10px;align-items:center;position:sticky;top:0;z-index:20}
.btn-nav{background:#1e1e2e;color:#aaa;border-color:#3a3a5a;padding:6px 16px}
.btn-nav:hover{background:#2a2a4a;color:#fff}
.btn-today{background:#1e3a5f;color:#5ba3f5;border-color:#2a5080;padding:6px 16px}
.btn-today:hover{background:#2a5080}
.nav-range{font-size:12px;color:#666;margin-left:auto}
/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:#1a4a2e;color:#4dba78;padding:14px 24px;border-radius:10px;border:1px solid #2d8a52;font-size:14px;font-weight:600;z-index:100;transform:translateY(100px);opacity:0;transition:all 0.3s}
.toast.show{transform:translateY(0);opacity:1}
.toast.error{background:#3a1020;color:#f05070;border-color:#8a2040}
.drag-tooltip{display:none;position:fixed;background:#1e1e2e;border:1px solid #3a3a5a;border-radius:8px;padding:10px 12px;font-size:12px;color:#ddd;z-index:120;pointer-events:none}
/* Live pulse */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.live-indicator{display:flex;align-items:center;gap:6px;margin-right:8px}
.live-dot{width:8px;height:8px;border-radius:50%;background:#4dba78;box-shadow:0 0 8px #4dba78;animation:pulse 2s infinite}
.live-text{font-size:11px;color:#4dba78;font-weight:700;letter-spacing:1px}
/* Read-only mode */
body.readonly-mode .bar{cursor:default!important;pointer-events:none}
body.readonly-mode .note-card{cursor:default!important;pointer-events:none}
body.readonly-mode .note-add{display:none!important}
body.readonly-mode .btn{display:none!important}
body.readonly-mode .lang-btn{display:block!important}
body.readonly-mode select{display:none!important}
/* Responsive */
@media(max-width:768px){
  header{padding:16px}
  .container{padding:16px}
  .stats{grid-template-columns:repeat(2,1fr)}
  .task-label{min-width:220px;width:220px}
  .gh-label{min-width:220px;width:220px}
  .procurement-items{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header>
  <div>
    <h1 id="hTitle">Galatsi Residence — Construction Timeline</h1>
    <div class="sub" id="hSub">Ipeirou 22, Galatsi · LEED Platinum · Live progress tracker</div>
  </div>
  <div class="header-right">
    <div class="live-indicator"><div class="live-dot"></div><span class="live-text">LIVE</span></div>
    <select id="unitSelect"><option value="">— Select Unit —</option></select>
    <button class="btn btn-save" onclick="saveData()" title="Save">💾 Save</button>
    <button class="btn btn-primary" onclick="exportJSON()" title="Download">⬇ Export</button>
    <button class="btn btn-primary" onclick="printTimeline()" title="Print/PDF">🖨 Print</button>
    <label class="btn btn-primary" style="margin:0" title="Import">⬆ Import<input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)"></label>
    <button class="lang-btn" id="langBtn" onclick="toggleLang()">GR Ελληνικά</button>
    <div class="last-updated" id="lastUpdated" style="font-size:11px;color:#888;"></div>
  </div>
</header>

<div class="nav-bar" id="navBar" style="display:none">
  <button class="btn btn-nav" onclick="scrollByMonth(-1)">◂ Prev</button>
  <button class="btn btn-today" onclick="scrollToToday()">● Today</button>
  <button class="btn btn-nav" onclick="scrollByMonth(1)">Next ▸</button>
  <span class="nav-range" id="navRange"></span>
</div>

<div id="app">
  <div class="container">
    <div class="empty-state" style="text-align:center;padding:80px 32px;color:#555">
      <h2 style="font-size:24px;margin-bottom:12px;color:#888">Select a Unit</h2>
      <p style="font-size:14px;max-width:400px;margin:0 auto">Choose a unit from the dropdown above.</p>
    </div>
  </div>
</div>

<!-- Task Editor Modal -->
<div class="editor-overlay" id="editorOverlay">
  <div class="editor">
    <h2 id="edTitle">Edit Task</h2>
    <div class="task-id" id="edTaskId"></div>
    <div class="field">
      <label id="edStatusLbl">Status</label>
      <select id="edStatus">
        <option value="pending">Pending / Scheduled</option>
        <option value="inprogress">In Progress</option>
        <option value="complete">Complete</option>
        <option value="critical">Critical Path</option>
        <option value="blocked">Blocked</option>
      </select>
    </div>
    <div class="field-row">
      <div class="field">
        <label id="edStartLbl">Start Date</label>
        <input type="date" id="edStart">
      </div>
      <div class="field">
        <label id="edEndLbl">End Date</label>
        <input type="date" id="edEnd">
      </div>
    </div>
    <div class="field">
      <label id="edNotesLbl">Notes</label>
      <textarea id="edNotes" placeholder="Task notes..."></textarea>
    </div>
    <div class="editor-actions">
      <button class="btn btn-danger" onclick="clearTask()">Clear</button>
      <button class="btn btn-primary" onclick="closeEditor()">Cancel</button>
      <button class="btn btn-save" onclick="saveTask()">Save</button>
    </div>
  </div>
</div>

<!-- Note Editor Modal -->
<div class="editor-overlay" id="noteOverlay">
  <div class="editor">
    <h2 id="noteEdTitle">Edit Note</h2>
    <div class="field">
      <label>Label</label>
      <input id="noteEdLabel" placeholder="e.g. Action Required...">
    </div>
    <div class="field">
      <label>Type</label>
      <select id="noteEdType">
        <option value="info">Info (blue)</option>
        <option value="action">Action Required (red)</option>
        <option value="warning">Warning (orange)</option>
        <option value="done">Done (green)</option>
      </select>
    </div>
    <div class="field">
      <label>Note</label>
      <textarea id="noteEdText" placeholder="Project note..." rows="4"></textarea>
    </div>
    <div class="editor-actions">
      <button class="btn btn-danger" id="noteDeleteBtn" onclick="deleteNote()" style="display:none">Delete</button>
      <button class="btn btn-primary" onclick="closeNoteEditor()">Cancel</button>
      <button class="btn btn-save" onclick="saveNote()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="drag-tooltip" id="dragTooltip"></div>

<!-- Password Modal -->
<div id="pwdModal" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);z-index:9999;display:flex;justify-content:center;align-items:center">
  <div style="background:#16161d;border:1px solid #3a3a5a;border-radius:16px;padding:32px;text-align:center;max-width:320px">
    <h2 style="color:#fff;margin-bottom:8px">Staff Access</h2>
    <p style="color:#888;font-size:13px;margin-bottom:20px">Enter password to continue</p>
    <input type="password" id="pwdInput" placeholder="Password" style="width:100%;background:#1e1e2e;border:1px solid #3a3a5a;color:#e8e8e8;padding:12px 16px;border-radius:8px;font-size:16px;margin-bottom:16px;outline:none" onkeypress="if(event.key==='Enter')checkPwd()">
    <button onclick="checkPwd()" style="width:100%;background:#1e3a5f;color:#5ba3f5;border:1px solid #2a5080;padding:12px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer">Enter</button>
    <p id="pwdError" style="color:#f05070;font-size:12px;margin-top:12px;display:none">Incorrect password</p>
  </div>
</div>

<script>
function checkPwd(){
  var pass = document.getElementById('pwdInput').value;
  if(pass === 'emanatis2026'){
    document.getElementById('pwdModal').style.display = 'none';
    init();
  } else {
    document.getElementById('pwdError').style.display = 'block';
    document.getElementById('pwdInput').value = '';
    document.getElementById('pwdInput').focus();
  }
}

function buildMonths(){
  MONTHS = [];
  var d = new Date(TS.getFullYear(), TS.getMonth(), 1);
  var end = new Date(TE.getFullYear(), TE.getMonth(), 1);
  while(d <= end){ MONTHS.push(d.toLocaleDateString('en-GB',{month:'short',year:'numeric'})); d.setMonth(d.getMonth()+1); }
}

function lft(d){return(((new Date(d)-TS)/86400000)/TD*100).toFixed(2)+'%';}
function wid(s,e){return(((new Date(e)-new Date(s))/86400000)/TD*100).toFixed(2)+'%';}
function pct(d){return((new Date(d)-TS)/86400000/TD*100).toFixed(2);}
function fmt(d){return new Date(d).toLocaleDateString(LANG==='el'?'el-GR':'en-GB',{day:'numeric',month:'short'});}
function todayPct(){return pct(new Date());}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// === INIT ===
function init(){
  var params = new URLSearchParams(window.location.search);
  
  // Check for unit-specific read-only modes
  var unitModes = {
    'gaia': '1a',
    'harmonia': '1b',
    'aurora': '2a',
    'serenity': '2b',
    'celestia': '3a',
    'solarus': '3b',
    'radiance': '4a',
    'elysium': '4b',
    'luminara': '5a',
    'aetheria': 'p'
  };
  
  var targetUnit = null;
  for(var mode in unitModes){
    if(params.get(mode) === '1'){
      targetUnit = unitModes[mode];
      break;
    }
  }
  
  window.IS_READONLY = !!targetUnit;

  fetch(DATA_URL).then(r=>r.json()).then(data=>{
    DATA = data;
    localStorage.setItem(DATA_KEY, JSON.stringify(DATA));
    if(targetUnit){
      CURRENT_UNIT = targetUnit;
      document.body.classList.add('readonly-mode');
      var unit = DATA.units[targetUnit];
      document.querySelector('h1').textContent = 'Galatsi Residence — ' + unit.name + ' Timeline';
      document.getElementById('hSub').textContent = 'Private Client Portal · Floor ' + unit.floor + ' · ' + (unit.size_m2||'') + ' m²';
      renderUnit(targetUnit);
    } else {
      populateSelect();
      toast('Loaded');
    }
  }).catch(()=>{
    var saved = localStorage.getItem(DATA_KEY);
    if(saved){ DATA = JSON.parse(saved); populateSelect(); toast('Loaded from cache'); }
  });
}

function populateSelect(){
  var sel = document.getElementById('unitSelect');
  sel.innerHTML = '<option value="">— Select Unit —</option>';
  Object.keys(DATA.units).forEach(id=>{
    var u = DATA.units[id];
    sel.innerHTML += '<option value="'+id+'">'+u.name+' (Floor '+u.floor+')</option>';
  });
  sel.onchange = function(){ if(sel.value) renderUnit(sel.value); };
}

  // Stats

  html += '<div class="stat"><div class="slabel">'+(LANG==='el'?'Παράδοση':'Handover')+'</div><div class="svalue">'+(LANG==='el'?'Αρχές Μαΐου':'Early May')+'</div><div class="ssub">2026</div></div>';
  html += '</div>';

  // Legend
  html += '<div class="legend">';
  html += '<div class="legend-item"><div class="legend-dot" style="background:#22663d;border:1px solid #2d8a52"></div><span>'+(LANG==='el'?'Ολοκληρώθηκε':'Complete')+'</span></div>';
  html += '<div class="legend-item"><div class="legend-dot" style="background:#5a4010;border:1px solid #8a6420"></div><span>'+(LANG==='el'?'Σε Εξέλιξη':'In Progress')+'</span></div>';
  html += '<div class="legend-item"><div class="legend-dot" style="background:#252545;border:1px solid #353560"></div><span>'+(LANG==='el'?'Προγραμματισμένο':'Scheduled')+'</span></div>';
  html += '<div class="legend-item"><div class="legend-dot" style="background:#5a1830;border:1px solid #8a2040"></div><span>'+(LANG==='el'?'Κρίσιμη Διαδρομή':'Critical')+'</span></div>';
  html += '<div class="legend-item"><div class="legend-dot" style="background:#5a3010;border:1px solid #8a5020"></div><span>'+(LANG==='el'?'Αποκλεισμένο':'Blocked')+'</span></div>';
  html += '<div class="legend-item"><div class="legend-dot" style="background:#14512e;border:1px solid #1d7a44"></div><span>'+(LANG==='el'?'Παραγγελμένο':'Ordered')+'</span></div>';
  html += '</div>';

  // Procurement Grid
  html += '<div class="procurement-grid">';
  var PROCUREMENT = LANG==='el' ? PROCUREMENT_EL : PROCUREMENT_EN;
  html += '<div class="procurement-header"><div><div class="procurement-title">'+(LANG==='el'?'Κατάσταση Προμήθειας':'Procurement Status')+'</div><div class="procurement-sub">'+(LANG==='el'?'Όλα παραγγελμένα, επιβεβαιωμένα & σε παραγωγή':'All items ordered, confirmed & in production')+'</div></div><div class="procurement-badge">'+PROCUREMENT.length+' Items Ordered</div></div>';
  html += '<div class="procurement-items">';
  PROCUREMENT.forEach(p=>{
    html += '<div class="procurement-item"><div class="procurement-check">✓</div><div class="procurement-item-name">'+p.name+'</div></div>';
  });
  html += '</div></div>';

  // Gantt
  html += '<div class="gantt-wrap"><div class="gantt-inner">';
  html += '<div class="gantt-header-row"><div class="gh-label">Task</div><div class="gh-months">';
  // Render months with width proportional to days
  for(var mi=0;mi<12;mi++){
    var monthStart = new Date(2026, mi, 1);
    var monthEnd = new Date(2026, mi+1, 0); // Last day of month
    var nextMonthStart = new Date(2026, mi+1, 1);
    var monthWid = wid(monthStart.toISOString().slice(0,10), nextMonthStart.toISOString().slice(0,10));
    var monthLeft = lft(monthStart.toISOString().slice(0,10));
    html+='<div class="gh-month" style="position:absolute;left:'+monthLeft+';width:'+monthWid+'">'+MONTHS[mi]+'</div>';
  }
  html += '</div></div>';

  tmpl.forEach(t=>{

      if(LANG==='el'){

        var enSecs = ['Structure & Envelope','MEP - Mechanical, Electrical, Plumbing','Interior Finishes','Doors, Windows & Openings','Building-Wide Systems','Handover Sequence'];
        var idx = enSecs.indexOf(t.sec);
        if(idx >= 0) secLabel = grSecs[idx];
      }
      html += '<div class="section-hdr"><span class="section-hdr-label">'+secLabel+'</span></div>';
      return;
    }
    var task = tasks[t.id] || {};
    var st = task.st || 'pending';
    var s = task.s || '';
    var e = task.e || '';
    var nt = task.nt || 'Click to set dates';
    var icon = TASK_ICONS[t.id] || '';
    var taskName = (LANG==='el' && TASK_NAMES_EL[t.id]) ? TASK_NAMES_EL[t.id] : t.nm;
    var taskNote = (LANG==='el' && TASK_NOTES_EL[t.id]) ? TASK_NOTES_EL[t.id] : nt;
    if(LANG==='el' && nt === 'Click to set dates') taskNote = 'Κάντε κλικ για να ορίσετε ημερομηνίες';

    html += '<div class="task-row">';
    html += '<div class="task-label">';
    if(icon) html += '<span class="task-icon">'+icon+'</span>';
    html += '<div><div class="task-name">'+esc(taskName)+'</div><div class="task-note">'+esc(taskNote)+'</div></div></div>';
    html += '<div class="task-timeline"><div class="today-line" style="left:'+tp+'%"></div>';
    // Add month grid lines at actual month boundaries
    for(var m=1;m<=12;m++){
      var monthStart = new Date(2026, m, 1); // First day of each month (0-indexed months)
      if(monthStart <= TE){
        var linePct = pct(monthStart.toISOString().slice(0,10));
        html += '<div class="month-grid-line" style="left:'+linePct+'%"></div>';
      }
    }
    if(s && e){
      var dateStr = fmt(s)+' → '+fmt(e);
      // Calculate bar width as percentage of timeline
      var barPct = parseFloat(wid(s,e));
      // If bar spans more than 5% of timeline (~18 days), show dates inside
      var showDatesInside = barPct > 5;
      
      if(!showDatesInside){
        // Short tasks: Dates outside, before the bar
        html += '<div class="bar-date-external" style="position:absolute;top:50%;transform:translateY(-50%);left:calc('+lft(s)+' - 110px);font-size:10px;color:#4dba78;white-space:nowrap">'+dateStr+'</div>';
        html += '<div class="bar '+st+'" data-tid="'+t.id+'" data-start="'+s+'" data-end="'+e+'" style="left:calc('+lft(s)+' + 2px);width:calc('+wid(s,e)+' - 4px)"><div class="handle handle-left"></div><div class="handle handle-right"></div></div>';
      } else {
        // Longer tasks: Dates centered inside the bar
        html += '<div class="bar '+st+'" data-tid="'+t.id+'" data-start="'+s+'" data-end="'+e+'" style="left:calc('+lft(s)+' + 2px);width:calc('+wid(s,e)+' - 4px)"><div class="handle handle-left"></div><span class="bar-date">'+dateStr+'</span><div class="handle handle-right"></div></div>';
      }
    } else {
      var clickText = LANG==='el' ? '+ Κάντε κλικ για να ορίσετε ημερομηνίες' : '+ Click to set dates';
      html += '<div style="position:absolute;top:50%;transform:translateY(-50%);left:16px;font-size:11px;color:#444;cursor:pointer" onclick="openEditor(\''+t.id+'\')">'+clickText+'</div>';
    }
    html += '</div></div>';
  });
  html += '</div></div>';

  // Handover
  html += '<div class="handover-panel"><div><h3>'+(LANG==='el'?'Παράδοση Κλειδιών':'Key Handover')+' — '+esc(unit.name)+'</h3><p>'+(LANG==='el'?'Επαγγελματικός καθαρισμός · Έξυπνο σπίτι · Πλήρης έλεγχος':'Professional cleaning · Smart home configured · All systems commissioned')+'</p></div>';
  var hd = unit.handoverDate ? fmt(unit.handoverDate) : (unit.handover || 'Early May 2026');
  html += '<div class="hdate">'+esc(hd)+'</div></div>';

  // Notes
  var notes = unit.notes || {};
  var noteMeta = unit._noteMeta || {};
  html += '<div class="notes-section"><h3>'+(LANG==='el'?'Σημειώσεις Έργου':'Project Notes')+' <button class="btn btn-primary" style="padding:4px 12px;font-size:11px" onclick="openNoteEditor()">+ Add</button></h3><div class="notes-grid">';
  Object.keys(notes).forEach(nk=>{
    if(!notes[nk]) return;
    var nType = (noteMeta[nk]&&noteMeta[nk].type) || 'info';
    var nLabel = (noteMeta[nk]&&noteMeta[nk].label) || nk;
    var nText = notes[nk];
    if(LANG==='el'){
      nLabel = NOTE_LABELS_EL[nk] || nLabel;
      nText = NOTE_TEXTS_EL[nk] || nText;
    }
    html += '<div class="note-card" data-notekey="'+esc(nk)+'" onclick="openNoteEditor(\''+esc(nk)+'\')"><div class="note-tag '+nType+'">'+esc(nLabel)+'</div><p>'+esc(nText)+'</p></div>';
  });
  html += '<div class="note-add" onclick="openNoteEditor()">+ Add Note</div>';
  html += '</div><div class="notes-custom"><textarea id="customNotes" placeholder="'+(LANG==='el'?'Προσθέστε σημειώσεις...':'Add notes...')+'"></textarea></div></div>';

  html += '</div>';

  document.getElementById('app').innerHTML = html;
  document.getElementById('navBar').style.display = 'flex';
  updateNavRange();
  updateLastUpdated();
  setTimeout(scrollToToday, 100);
  enableDragScroll();
  enableBarDrag();
}

// === EDITORS ===
function openEditor(tid){
  if(!CURRENT_UNIT || window.IS_READONLY) return;
  EDITING_TASK = tid;
  var task = (DATA.units[CURRENT_UNIT].tasks||{})[tid] || {};
  var tmpl = DATA.taskTemplate.find(t=>t.id===tid);
  document.getElementById('edTitle').textContent = tmpl ? tmpl.nm : tid;
  document.getElementById('edTaskId').textContent = 'ID: ' + tid;
  document.getElementById('edStatus').value = task.st || 'pending';
  document.getElementById('edStart').value = task.s || '';
  document.getElementById('edEnd').value = task.e || '';
  document.getElementById('edNotes').value = task.nt || '';
  document.getElementById('editorOverlay').classList.add('active');
}
function closeEditor(){ document.getElementById('editorOverlay').classList.remove('active'); EDITING_TASK = null; }
function saveTask(){
  if(!CURRENT_UNIT || !EDITING_TASK) return;
  if(!DATA.units[CURRENT_UNIT].tasks) DATA.units[CURRENT_UNIT].tasks = {};
  var s = document.getElementById('edStart').value;
  var e = document.getElementById('edEnd').value;
  if(s && e && new Date(e) < new Date(s)){ toast('End must be after start', true); return; }
  DATA.units[CURRENT_UNIT].tasks[EDITING_TASK] = {st:document.getElementById('edStatus').value,s:s,e:e,nt:document.getElementById('edNotes').value||'TBD'};
  closeEditor(); renderUnit(CURRENT_UNIT); autoSave(); toast('Saved');
}
function clearTask(){
  if(!CURRENT_UNIT || !EDITING_TASK) return;
  delete DATA.units[CURRENT_UNIT].tasks[EDITING_TASK];
  closeEditor(); renderUnit(CURRENT_UNIT); autoSave(); toast('Cleared');
}

function openNoteEditor(nk){
  if(!CURRENT_UNIT || window.IS_READONLY) return;
  EDITING_NOTE = nk || null;
  var unit = DATA.units[CURRENT_UNIT];
  if(nk && unit.notes && unit.notes[nk]){
    var meta = (unit._noteMeta||{})[nk] || {};
    document.getElementById('noteEdTitle').textContent = 'Edit Note';
    document.getElementById('noteEdLabel').value = meta.label || nk;
    document.getElementById('noteEdType').value = meta.type || 'info';
    document.getElementById('noteEdText').value = unit.notes[nk];
    document.getElementById('noteDeleteBtn').style.display = '';
  } else {
    document.getElementById('noteEdTitle').textContent = 'Add Note';
    document.getElementById('noteEdLabel').value = '';
    document.getElementById('noteEdType').value = 'info';
    document.getElementById('noteEdText').value = '';
    document.getElementById('noteDeleteBtn').style.display = 'none';
  }
  document.getElementById('noteOverlay').classList.add('active');
}
function closeNoteEditor(){ document.getElementById('noteOverlay').classList.remove('active'); EDITING_NOTE = null; }
function saveNote(){
  if(!CURRENT_UNIT) return;
  var label = document.getElementById('noteEdLabel').value.trim();
  var text = document.getElementById('noteEdText').value.trim();
  if(!label || !text){ toast('Label and text required', true); return; }
  if(!DATA.units[CURRENT_UNIT].notes) DATA.units[CURRENT_UNIT].notes = {};
  if(!DATA.units[CURRENT_UNIT]._noteMeta) DATA.units[CURRENT_UNIT]._noteMeta = {};
  if(EDITING_NOTE) delete DATA.units[CURRENT_UNIT].notes[EDITING_NOTE];
  var key = label.toLowerCase().replace(/[^a-z0-9]/g,'').substring(0,20) || ('note'+Date.now());
  DATA.units[CURRENT_UNIT].notes[key] = text;
  DATA.units[CURRENT_UNIT]._noteMeta[key] = {label:label,type:document.getElementById('noteEdType').value};
  closeNoteEditor(); renderUnit(CURRENT_UNIT); autoSave(); toast('Note saved');
}
function deleteNote(){
  if(!CURRENT_UNIT || !EDITING_NOTE) return;
  delete DATA.units[CURRENT_UNIT].notes[EDITING_NOTE];
  if(DATA.units[CURRENT_UNIT]._noteMeta) delete DATA.units[CURRENT_UNIT]._noteMeta[EDITING_NOTE];
  closeNoteEditor(); renderUnit(CURRENT_UNIT); autoSave(); toast('Deleted');
}

// === SAVE/LOAD ===
function autoSave(){ try{ localStorage.setItem(DATA_KEY, JSON.stringify(DATA)); }catch(e){} }
function saveData(){
  fetch('/api/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(DATA)})
  .then(r=>r.json()).then(res=>{ if(res.error) toast('Save failed: '+res.error, true); else toast('Saved to server'); })
  .catch(()=>{ toast('Server unavailable — saved locally', true); autoSave(); });
}
function exportJSON(){
  var blob = new Blob([JSON.stringify(DATA,null,2)],{type:'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'luminara-units.json';
  a.click();
}
function importJSON(e){
  var file = e.target.files[0]; if(!file) return;
  var reader = new FileReader();
  reader.onload = function(ev){
    try{ DATA = JSON.parse(ev.target.result); localStorage.setItem(DATA_KEY,JSON.stringify(DATA)); populateSelect(); toast('Imported'); }
    catch(err){ toast('Invalid JSON', true); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// === PRINT ===
function printTimeline(){
  var printWindow = window.open('', '_blank');
  var unit = CURRENT_UNIT ? DATA.units[CURRENT_UNIT] : null;
  var title = unit ? unit.name + ' — Construction Timeline' : 'Galatsi Residence — Construction Timeline';
  var html = '<!DOCTYPE html><html><head><title>'+title+'</title><style>';
  html += 'body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#fff;color:#333;padding:20px}';
  html += 'h1{font-size:18px;margin-bottom:4px}h2{font-size:14px;color:#666;margin-bottom:20px}';
  html += 'table{width:100%;border-collapse:collapse;font-size:12px}th,td{border:1px solid #ddd;padding:8px;text-align:left}';
  html += 'th{background:#f5f5f5}.status-complete{color:#2d8a52}.status-inprogress{color:#8a6420}.status-pending{color:#666}';
  html += '.section{background:#f0f0f0;font-weight:bold}@media print{body{padding:0}}</style></head><body>';
  html += '<h1>'+title+'</h1>';
  html += '<h2>Ipeirou 22, Galatsi · Generated ' + new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) + '</h2>';
  if(unit && unit.tasks){
    html += '<table><tr><th>Task</th><th>Status</th><th>Start</th><th>End</th><th>Notes</th></tr>';
    var tmpl = DATA.taskTemplate;
    tmpl.forEach(t=>{
      if(t.sec){ html += '<tr class="section"><td colspan="5">'+t.sec+'</td></tr>'; return; }
      var task = unit.tasks[t.id] || {};
      var st = task.st || 'pending';
      html += '<tr><td>'+t.nm+'</td><td class="status-'+st+'">'+st.charAt(0).toUpperCase()+st.slice(1)+'</td>';
      html += '<td>'+(task.s||'—')+'</td><td>'+(task.e||'—')+'</td><td>'+(task.nt||'')+'</td></tr>';
    });
    html += '</table>';
  }
  html += '</body></html>';
  printWindow.document.write(html);
  printWindow.document.close();
  printWindow.print();
}

// === NAV ===
function scrollToToday(){
  var wrap = document.querySelector('.gantt-wrap'); if(!wrap) return;
  var line = wrap.querySelector('.today-line');
  if(line){ var rect = wrap.getBoundingClientRect(); wrap.scrollTo({left:line.offsetLeft-rect.width/2,behavior:'smooth'}); }

function scrollByMonth(dir){

  if(months && months.children[0]) wrap.scrollBy({left:dir*months.children[0].offsetWidth,behavior:'smooth'});

// === TOAST ===
function toast(msg,isErr){ var el=document.getElementById('toast'); el.textContent=msg; el.className='toast show'+(isErr?' error':''); setTimeout(()=>el.className='toast',2500); }

// === DRAG SCROLL ===
function enableDragScroll(){
  if(window.IS_READONLY) return;
  var wrap=document.querySelector('.gantt-wrap'); if(!wrap) return;
  var isDown=false,startX=0,scrollLeft=0;
  wrap.addEventListener('mousedown',e=>{
    if(e.target.closest('.bar')||e.target.closest('input')||e.target.closest('button')) return;
    isDown=true; startX=e.pageX-wrap.offsetLeft; scrollLeft=wrap.scrollLeft; wrap.style.cursor='grabbing';
  });
  window.addEventListener('mouseup',()=>{isDown=false; wrap.style.cursor='grab';});
  wrap.addEventListener('mousemove',e=>{ if(!isDown) return; e.preventDefault(); wrap.scrollLeft=scrollLeft-(e.pageX-wrap.offsetLeft-startX); });
}

// === BAR DRAG ===
var BAR_DRAG=null;
function showDragTip(x,y,txt){ var t=document.getElementById('dragTooltip'); t.style.display='block'; t.style.left=(x+14)+'px'; t.style.top=(y-10)+'px'; t.innerHTML=txt; }
function hideDragTip(){ document.getElementById('dragTooltip').style.display='none'; }
function startBarDrag(bar,e){
  if(window.IS_READONLY) return;
  var rect=bar.parentElement.getBoundingClientRect();
  var start=new Date(bar.dataset.start), end=new Date(bar.dataset.end);
  if(!bar.dataset.start||!bar.dataset.end||isNaN(start)||isNaN(end)) return;
  var mode='move';
  if(e.target.classList.contains('handle-left')) mode='resize-left';
  else if(e.target.classList.contains('handle-right')) mode='resize-right';
  BAR_DRAG={bar,tid:bar.dataset.tid,rect,startX:e.clientX,origStart:start,origEnd:end,mode,moved:false};
  document.addEventListener('mousemove',onBarDrag);
  document.addEventListener('mouseup',endBarDrag);
}
function onBarDrag(e){
  if(!BAR_DRAG) return;
  var dx=e.clientX-BAR_DRAG.startX;
  if(Math.abs(dx)<4 && !BAR_DRAG.moved) return;
  BAR_DRAG.moved=true;
  var daysDelta=Math.round((dx/BAR_DRAG.rect.width)*TD);
  var ns=new Date(BAR_DRAG.origStart), ne=new Date(BAR_DRAG.origEnd);
  if(BAR_DRAG.mode==='move'){ ns=new Date(BAR_DRAG.origStart.getTime()+daysDelta*86400000); ne=new Date(BAR_DRAG.origEnd.getTime()+daysDelta*86400000); }
  else if(BAR_DRAG.mode==='resize-left'){ ns=new Date(BAR_DRAG.origStart.getTime()+daysDelta*86400000); if(ns>=ne) ns=new Date(ne.getTime()-86400000); }
  else{ ne=new Date(BAR_DRAG.origEnd.getTime()+daysDelta*86400000); if(ne<=ns) ne=new Date(ns.getTime()+86400000); }
  BAR_DRAG.bar.style.left='calc('+lft(ns.toISOString().slice(0,10))+' + 2px)';
  BAR_DRAG.bar.style.width='calc('+wid(ns.toISOString().slice(0,10),ne.toISOString().slice(0,10))+' - 4px)';
  BAR_DRAG.bar.dataset.start=ns.toISOString().slice(0,10);
  BAR_DRAG.bar.dataset.end=ne.toISOString().slice(0,10);
  var dateStr = fmt(ns.toISOString().slice(0,10))+' → '+fmt(ne.toISOString().slice(0,10));
  var bd=BAR_DRAG.bar.querySelector('.bar-date');
  if(bd) bd.textContent=dateStr;
  // Also update external date element if it exists
  var extDate = BAR_DRAG.bar.parentElement.querySelector('.bar-date-external');
  if(extDate){
    extDate.textContent = dateStr;
    extDate.style.left = 'calc('+lft(ns.toISOString().slice(0,10))+' - 110px)';
  }
  showDragTip(e.clientX,e.clientY,'<strong>'+fmt(ns.toISOString().slice(0,10))+'</strong> → <strong>'+fmt(ne.toISOString().slice(0,10))+'</strong>');
}
function endBarDrag(e){
  if(!BAR_DRAG) return;
  var tid=BAR_DRAG.tid, bar=BAR_DRAG.bar, moved=BAR_DRAG.moved;
  document.removeEventListener('mousemove',onBarDrag);
  document.removeEventListener('mouseup',endBarDrag);
  hideDragTip();
  if(!moved){ BAR_DRAG=null; if(tid) openEditor(tid); return; }
  if(CURRENT_UNIT && tid && DATA.units[CURRENT_UNIT].tasks && DATA.units[CURRENT_UNIT].tasks[tid]){
    DATA.units[CURRENT_UNIT].tasks[tid].s=bar.dataset.start;
    DATA.units[CURRENT_UNIT].tasks[tid].e=bar.dataset.end;
    autoSave();
    renderUnit(CURRENT_UNIT); // Re-render to recalculate date positions
    toast('Updated');
  }
  BAR_DRAG=null;
}
function enableBarDrag(){
  if(window.IS_READONLY) return;
  document.querySelectorAll('.bar').forEach(bar=>{ bar.style.cursor='grab'; bar.onmousedown=e=>{e.stopPropagation();e.preventDefault();startBarDrag(bar,e);}; });
}

}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){ closeEditor(); closeNoteEditor(); }
  if(e.key==='s' && (e.metaKey||e.ctrlKey)){ e.preventDefault(); saveData(); }
});
