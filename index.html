<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emanatis Staff Portal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f13;color:#e8e8e8;min-height:100vh}
header{background:#16161d;border-bottom:1px solid #2a2a3a;padding:24px 32px}
header h1{font-size:24px;font-weight:600;color:#fff}
header p{color:#888;margin-top:6px;font-size:14px}
.container{max-width:1200px;margin:0 auto;padding:40px 32px}
.projects{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.project-card{background:#16161d;border:1px solid #2a2a3a;border-radius:12px;padding:24px;transition:border-color .2s}
.project-card:hover{border-color:#5ba3f5}
.project-card h2{font-size:18px;color:#fff;margin-bottom:8px}
.project-card p{color:#888;font-size:14px;margin-bottom:16px;line-height:1.5}
.project-card .location{color:#5ba3f5;font-size:12px;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.btn{display:inline-block;padding:10px 20px;background:#1e3a5f;color:#5ba3f5;border:1px solid #2a5080;border-radius:8px;text-decoration:none;font-size:13px;font-weight:600;transition:all .2s}
.btn:hover{background:#2a5080}
.footer{margin-top:60px;padding-top:24px;border-top:1px solid #2a2a3a;color:#666;font-size:12px}
</style>
</head>
<body>
<header>
<h1>Emanatis Staff Portal</h1>
<p>All projects and client timelines</p>
</header>
<div class="container">
<div class="projects">
<div class="project-card">
<div class="location">Galatsi, Athens</div>
<h2>Galatsi Residence</h2>
<p>10-unit residential building at Ipeirou 22, Galatsi. Timeline, milestones, and construction progress.</p>
<a href="gaia-timeline.html" class="btn">View All Units</a>
</div>
</div>
<div class="footer">
<p>Emanatis Group Staff Portal — Internal Use Only</p>
</div>
</div>
</body>
</html>
